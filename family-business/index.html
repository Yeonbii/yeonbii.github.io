<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bisnis Keluarga</title>
    <link rel="stylesheet" href="../src/css/main.css">
    <link rel="stylesheet" href="../src/css/family-business.css">
</head>

<body>

    <main class="container">
        <h2 class="px-8 mt-16 mb-10">List Harga Barang</h2>
    
        <div class="flex flex-wrap px-4">
            <div class="w-100 px-4 mb-10 md:w-25">
                <select name="categoryFilter" id="categoryFilter" class="w-100 p-8">
                    <option value="0">Semua Kategori</option>
                </select>
            </div>
            <div class="w-100 px-4 mb-10 md:w-75">
                <input type="text" id="searchField" placeholder="Cari barang..." class="w-100 p-8">
            </div>
        </div>
    
        <div class="px-8">
            <table class="table">
                <thead>
                    <tr>
                        <th class="no">No</th>
                        <th>Barang</th>
                        <th>Kategori</th>
                        <th>Harga</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <!-- Data akan diisi secara dinamis dari JSON -->
                </tbody>
            </table>
        </div>

    </main>

    <script src="../src/js/family-business.js"></script>

</body>

</html>
